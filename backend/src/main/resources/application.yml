server:
  port: 8080

spring:
  application:
    name: ai-travel

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ai_travel}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# LangChain4j
langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    chat-model:
      model-name: gpt-4o-mini
      temperature: 0.0
    streaming-chat-model:
      model-name: gpt-4o-mini

JWT_SECRET: ${JWT_SECRET:this-is-a-secret-key-must-be-at-least-256-bits-long-for-hs256}
JWT_ACCESS_EXPIRY_MS: ${JWT_ACCESS_EXPIRY_MS:3600000}
JWT_REFRESH_EXPIRY_MS: ${JWT_REFRESH_EXPIRY_MS:604800000}
TAVILY_API_KEY: ${TAVILY_API_KEY:tvly-placeholder}
GAODE_API_KEY: ${GAODE_API_KEY:placeholder}
UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:placeholder}

# Logging
logging:
  level:
    com.travel.ai: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
